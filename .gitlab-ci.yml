# pangolin-proxy is intentionally excluded from CI rebuild jobs.
# It requires manual deployment via oc apply (see CLAUDE.md).

# =============================================================================
# Bootstrap Layer - Manual DR Only (NOT for CI/CD)
# =============================================================================
# The bootstrap layer is intentionally NOT included in CI/CD.
# See infrastructure/bootstrap/README.md for disaster recovery procedures.
#
# To manage bootstrap resources:
#   cd infrastructure/bootstrap
#   tofu init
#   tofu plan
#   tofu apply  # Only during DR recovery!
