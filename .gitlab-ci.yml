  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

rebuild-forgejo:
  stage: configure
  tags:
    - iac
  script:
    - cd ansible
    - >-
      ansible-playbook -i inventory/hosts.ini playbooks/forgejo-server.yml
      -e "forgejo_db_password=${FORGEJO_DB_PASSWORD}"
      -e "forgejo_oidc_client_secret=${FORGEJO_OIDC_CLIENT_SECRET}"
  when: manual
  allow_failure: false
  rules:
