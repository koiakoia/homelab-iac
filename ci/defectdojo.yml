# ci/defectdojo.yml - Upload security scan results to DefectDojo
#
# Uses reimport-scan with auto_create_context to deduplicate findings across
# pipeline runs. Each scan type gets a unique test_title so DefectDojo can
# match and update the existing test rather than creating a new one each run.
# close_old_findings=true closes findings no longer present in the latest scan.
---

# NOTE: curl -sk (insecure) is used for DefectDojo uploads because the
# runner trusts the LE CA but DefectDojo uses an internal TLS cert.
# Accepted risk: private LAN only, no public transit. Ref: L-16.

.defectdojo-upload:
  stage: upload-to-defectdojo
  tags:
    - iac
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

upload-trivy-iac:
  extends: .defectdojo-upload
  needs:
    - job: trivy-iac
      artifacts: true
  script:
    - |
      if [ ! -f trivy-iac-report.json ]; then
        echo "No trivy-iac-report.json found, skipping"
        exit 0
      fi
      echo "Uploading Trivy IaC scan to DefectDojo..."
      RESPONSE=$(curl -sk -X POST "${DEFECTDOJO_URL}/api/v2/reimport-scan/" \
        -H "Authorization: Token ${DEFECTDOJO_API_KEY}" \
        -F "scan_type=Trivy Scan" \
        -F "product_name=Sentinel IaC" \
        -F "engagement_name=Main Branch CI/CD" \
        -F "test_title=Trivy IaC Misconfig" \
        -F "auto_create_context=true" \
        -F "file=@trivy-iac-report.json" \
        -F "active=true" \
        -F "verified=false" \
        -F "close_old_findings=true" \
        -F "minimum_severity=Info" \
        -F "scan_date=$(date +%Y-%m-%d)" \
        -F "tags=trivy,iac,misconfig" \
        -w "\n%{http_code}")
      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      echo "HTTP Status: $HTTP_CODE"
      if [ "$HTTP_CODE" -ge 400 ]; then
        echo "Upload failed: $(echo "$RESPONSE" | head -1)"
        exit 1
      fi
      echo "Trivy IaC scan uploaded successfully"

