---
name: Packer
on:
  push:
    branches: [main]
    paths:
      - 'packer/**'
  pull_request:
    paths:
      - 'packer/**'
  workflow_dispatch:
    inputs:
      template:
        description: 'Packer template to build (e.g. iac-control, vault-server, gitlab-server, seedbox-vm, forgejo-server)'
        required: true

jobs:
  packer-validate:
    runs-on: iac
    steps:
      - uses: actions/checkout@v4
      - name: Validate all Packer templates
        run: |
          echo "Validating all Packer templates..."
          cd packer
          FAILED=0
          for template in *.pkr.hcl; do
            echo "--- Validating $template ---"
            packer init "$template"
            packer validate -syntax-only "$template"
            if [ $? -ne 0 ]; then
              echo "FAILED: $template"
              FAILED=1
            fi
          done
          exit $FAILED

  packer-build:
    runs-on: iac
    needs: packer-validate
    if: github.event_name == 'workflow_dispatch'
    env:
      PKR_VAR_proxmox_token_secret: ${{ secrets.PROXMOX_TOKEN_SECRET }}
      PKR_VAR_ssh_password: ${{ secrets.PACKER_SSH_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Build golden image
        run: |
          TEMPLATE="${{ github.event.inputs.template }}"
          echo "Building golden image: ${TEMPLATE}.pkr.hcl"
          cd packer
          packer init "${TEMPLATE}.pkr.hcl"
          packer build -force "${TEMPLATE}.pkr.hcl"
