---
name: Rebuild VM
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'VM to rebuild (iac-control, vault, gitlab, minio, seedbox, config-server, crowdsec, wazuh, forgejo)'
        required: true

env:
  ANSIBLE_HOST_KEY_CHECKING: "False"
  ANSIBLE_FORCE_COLOR: "true"

jobs:
  rebuild:
    runs-on: iac
    steps:
      - uses: actions/checkout@v4
      - name: Rebuild VM
        env:
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          CLOUDFLARE_DNS_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
          PANGOLIN_SERVER_SECRET: ${{ secrets.PANGOLIN_SERVER_SECRET }}
          NEWT_ID: ${{ secrets.NEWT_ID }}
          NEWT_SECRET: ${{ secrets.NEWT_SECRET }}
          FORGEJO_DB_PASSWORD: ${{ secrets.FORGEJO_DB_PASSWORD }}
          FORGEJO_OIDC_CLIENT_SECRET: ${{ secrets.FORGEJO_OIDC_CLIENT_SECRET }}
          GITLAB_OIDC_CLIENT_SECRET: ${{ secrets.GITLAB_OIDC_CLIENT_SECRET }}
        run: |
          TARGET="${{ github.event.inputs.target }}"
          cd ansible

          case "$TARGET" in
            iac-control)
              ansible-playbook -i inventory/hosts.ini playbooks/iac-control.yml
              ;;
            vault)
              ansible-playbook -i inventory/hosts.ini playbooks/vault-server.yml
              ;;
            gitlab)
              ansible-playbook -i inventory/hosts.ini playbooks/gitlab-server.yml \
                -e "minio_access_key=${MINIO_ACCESS_KEY}" \
                -e "minio_secret_key=${MINIO_SECRET_KEY}" \
                -e "gitlab_oidc_client_secret=${GITLAB_OIDC_CLIENT_SECRET}"
              ;;
            minio)
              ansible-playbook -i inventory/hosts.ini playbooks/minio-bootstrap.yml
              ;;
            seedbox)
              ansible-playbook -i inventory/hosts.ini playbooks/seedbox-vm.yml
              ;;
            config-server)
              ansible-playbook -i inventory/hosts.ini playbooks/config-server.yml
              ;;
            crowdsec)
              ansible-playbook -i inventory/hosts.ini playbooks/crowdsec.yml
              ;;
            wazuh)
              ansible-playbook -i inventory/hosts.ini playbooks/wazuh-server.yml
              ;;
            forgejo)
              ansible-playbook -i inventory/hosts.ini playbooks/forgejo-server.yml \
                -e "forgejo_db_password=${FORGEJO_DB_PASSWORD}" \
                -e "forgejo_oidc_client_secret=${FORGEJO_OIDC_CLIENT_SECRET}"
              ;;
            *)
              echo "Unknown target: $TARGET"
              echo "Valid targets: iac-control, vault, gitlab, minio, seedbox, config-server, crowdsec, wazuh, forgejo"
              exit 1
              ;;
          esac
