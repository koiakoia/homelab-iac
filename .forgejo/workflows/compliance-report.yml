---
name: Compliance Report
on:
  workflow_run:
    workflows: ["Lint", "Security Scan"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  compliance-report:
    runs-on: iac
    steps:
      - uses: actions/checkout@v4
      - name: Download scan artifacts
        uses: actions/download-artifact@v3
        with:
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true
      - name: Generate NIST 800-53 compliance report
        run: |
          cat > compliance-report.md << REPORT
          # NIST 800-53 Compliance Scan Report
          **Repository:** sentinel-iac
          **Run:** $GITHUB_RUN_NUMBER
          **Commit:** ${GITHUB_SHA:0:8}
          **Date:** $(date -u +"%Y-%m-%d %H:%M UTC")
          **Branch:** $GITHUB_REF_NAME

          ## Control Mapping

          | NIST Control | Title | CI Job | Status |
          |-------------|-------|--------|--------|
          | SA-11 | Developer Testing | ansible-lint, tflint, yamllint | $([ -f ansible-lint-report.json ] && echo "SCANNED" || echo "SKIPPED") |
          | SA-11(1) | Static Code Analysis | trivy-iac, tflint | $([ -f trivy-iac-report.json ] && echo "SCANNED" || echo "SKIPPED") |
          | RA-5 | Vulnerability/Config Scanning | trivy-config, trivy-iac | $([ -f trivy-config-report.json ] && echo "SCANNED" || echo "SKIPPED") |
          | IA-5(6) | Authenticator Protection | gitleaks | $([ -f gitleaks-report.json ] && echo "SCANNED" || echo "CLEAN") |
          | CM-3(2) | Test/Validate Changes | All lint + scan jobs | ENFORCED |
          | CA-7 | Continuous Monitoring | Pipeline execution | ACTIVE |

          ## Scan Summaries
          REPORT

          if [ -f trivy-iac-report.json ]; then
            echo "" >> compliance-report.md
            echo "### Trivy IaC Findings" >> compliance-report.md
            echo '```' >> compliance-report.md
            python3 -c "
          import json
          try:
              data = json.load(open('trivy-iac-report.json'))
              results = data.get('Results', [])
              total = sum(len(r.get('Misconfigurations', [])) for r in results)
              high = sum(1 for r in results for m in r.get('Misconfigurations', []) if m.get('Severity') in ('HIGH', 'CRITICAL'))
              print(f'Total findings: {total} (HIGH/CRITICAL: {high})')
          except:
              print('No findings or report not available')
          " >> compliance-report.md
            echo '```' >> compliance-report.md
          fi

          if [ -f trivy-config-report.json ]; then
            echo "" >> compliance-report.md
            echo "### Trivy Config Findings" >> compliance-report.md
            echo '```' >> compliance-report.md
            python3 -c "
          import json
          try:
              data = json.load(open('trivy-config-report.json'))
              results = data.get('Results', [])
              total = sum(len(r.get('Misconfigurations', [])) for r in results)
              high = sum(1 for r in results for m in r.get('Misconfigurations', []) if m.get('Severity') in ('HIGH', 'CRITICAL'))
              print(f'Total misconfigurations: {total} (HIGH/CRITICAL: {high})')
          except:
              print('No misconfigurations found')
          " >> compliance-report.md
            echo '```' >> compliance-report.md
          fi

          echo "" >> compliance-report.md
          echo "---" >> compliance-report.md
          echo "*Generated by sentinel-iac DevSecOps pipeline*" >> compliance-report.md
          cat compliance-report.md
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: compliance-report
          path: |
            compliance-report.md
            *.json
          retention-days: 90
