---
- name: Configure seedbox VM
  hosts: seedbox
  become: true
  vars:
    docker_users: [${USERNAME}]
  roles:
    - role: common
      tags: [common]
    - role: docker-host
      tags: [docker]
    - role: seedbox
      tags: [seedbox]
  post_tasks:
    - name: Reminder - VPN credentials required
      ansible.builtin.debug:
        msg: >
          Seedbox is configured but VPN credentials (WireGuard private key)
          must be set in /opt/seedbox/docker-compose.yml or via extra-vars.
      when: wireguard_private_key | default('') == ""
      tags: [seedbox]
