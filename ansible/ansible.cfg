[defaults]
inventory = inventory/hosts.ini,inventory/netbox_inventory.yml
roles_path = roles
private_key_file = ~/.ssh/id_sentinel
remote_user = ubuntu
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
