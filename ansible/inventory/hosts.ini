[iac_control]
# CIS exception: firewall_enabled=False — uses iptables directly (not UFW) due to HAProxy/Squid/dnsmasq routing
# CIS exception: net.ipv4.ip_forward=1 required for OKD cluster routing (vmbr1 bridge)
iac-control ansible_host=${IAC_CONTROL_IP} ansible_user=ubuntu firewall_enabled=False

[vault]
# CIS exception: sshd_permit_root_login=prohibit-password — required for Docker container management (cert-only)
vault-server ansible_host=${VAULT_IP} ansible_user=root sshd_permit_root_login=prohibit-password sshd_allow_groups="sudo root" firewall_allowed_ports='[22,8200]'

[gitlab]
gitlab-server ansible_host=${GITLAB_IP} ansible_user=${USERNAME} firewall_allowed_ports='[22,80,443]'

[minio]
minio-bootstrap ansible_host=${MINIO_PRIMARY_IP} ansible_user=root sshd_permit_root_login=prohibit-password sshd_allow_groups="sudo root" firewall_allowed_ports='[22,9000,9001]' auditd_enabled=False

[seedbox]
seedbox-vm ansible_host=${SEEDBOX_IP} ansible_user=${USERNAME} firewall_allowed_ports='[22,8080]'

[pangolin]
# CIS exception: net.ipv4.ip_forward=1 required for Traefik reverse proxy function
pangolin-proxy ansible_host=${PROXY_IP} ansible_user=ubuntu firewall_allowed_ports='[22,80,443]'

[wazuh]
wazuh-server ansible_host=${WAZUH_IP} ansible_user=${USERNAME} ansible_ssh_private_key_file=~/.ssh/id_wazuh firewall_allowed_ports='[22,443,1514,1515,55000]'

[forgejo]
forgejo-server ansible_host=${FORGEJO_IP} ansible_user=${USERNAME} firewall_allowed_ports='[22,3000,2222]'

[config_server]
# LXC 300 on pve — HA failover for iac-control (HAProxy, dnsmasq, keepalived)
# Reachable from iac-control via OKD internal network (${OKD_GATEWAY}) and via mgmt LAN (${OKD_WORKER_IP})
config-server ansible_host=${OKD_GATEWAY} ansible_user=ubuntu firewall_allowed_ports='[22,53,80,443,6443,22623]'

[managed_vms:children]
iac_control
vault
gitlab
minio
seedbox
pangolin
wazuh
forgejo
config_server

[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_sentinel
ansible_become=true
