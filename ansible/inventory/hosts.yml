---
# Ansible inventory for Sentinel infrastructure
# NIST CM-2 compliant configuration management

all:
  children:
    proxmox:
      hosts:
        pve:
          ansible_host: ${PROXMOX_NODE1_IP}
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          ansible_become: false

        proxmox-node-2:
          ansible_host: ${PROXMOX_NODE2_IP}
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          ansible_become: false

        proxmox-node-3:
          ansible_host: ${PROXMOX_NODE3_IP}
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          ansible_become: false

    infrastructure_control:
      hosts:
        iac-control:
          ansible_host: ${IAC_CONTROL_IP}
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_sentinel
          ansible_become: true

          # Network Configuration
          primary_interface: eth0
          okd_interface: ens19
          okd_network: ${OKD_NETWORK}/24
          okd_gateway_ip: ${OKD_NETWORK_GW}
          okd_dhcp_ip: ${OKD_DNS_IP}
          management_network: ${LAN_NETWORK}/24

          # Service Binding
          haproxy_stats_bind: 127.0.0.1:9000
          squid_port: 3128

    infrastructure_ha:
      hosts:
        config-server:
          ansible_host: ${OKD_GATEWAY}
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_sentinel
          ansible_become: true

          # Network Configuration
          cluster_interface: eth0
          management_interface: eth1
          config_server_ip: ${OKD_GATEWAY}

    gitlab:
      hosts:
        gitlab-server:
          ansible_host: ${GITLAB_IP}
          ansible_user: ${USERNAME}
          ansible_ssh_private_key_file: ~/.ssh/id_sentinel
          ansible_become: true

    vault:
      hosts:
        vault-server:
          ansible_host: ${VAULT_IP}
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_sentinel
          ansible_become: true

    storage:
      hosts:
        minio-bootstrap:
          ansible_host: ${MINIO_PRIMARY_IP}
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_sentinel
          ansible_become: true

    seedbox:
      hosts:
        seedbox-vm:
          ansible_host: ${SEEDBOX_IP}
          ansible_user: ${USERNAME}
          ansible_ssh_private_key_file: ~/.ssh/id_sentinel
          ansible_become: true

    wazuh:
      hosts:
        wazuh-server:
          ansible_host: ${WAZUH_IP}
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/id_sentinel
          ansible_become: true
