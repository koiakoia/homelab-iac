---
# Deploy Wazuh Vulnerability Prometheus Exporter
# Relates to: sentinel-iac#34

- name: Create sentinel scripts directory
  ansible.builtin.file:
    path: /opt/sentinel
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy wazuh-vuln-exporter script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/wazuh-vuln-exporter.py"
    dest: /opt/sentinel/wazuh-vuln-exporter.py
    owner: root
    group: root
    mode: '0755'
  notify: Restart wazuh-vuln-exporter

- name: Deploy wazuh-vuln-exporter systemd service
  ansible.builtin.template:
    src: wazuh-vuln-exporter.service.j2
    dest: /etc/systemd/system/wazuh-vuln-exporter.service
    owner: root
    group: root
    mode: '0644'
  notify: Restart wazuh-vuln-exporter

- name: Enable and start wazuh-vuln-exporter
  ansible.builtin.systemd:
    name: wazuh-vuln-exporter
    state: started
    enabled: true
    daemon_reload: true
