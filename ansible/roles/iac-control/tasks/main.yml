---
# iac-control role - main tasks
# Configures HAProxy, Squid, dnsmasq, iptables, netplan, IP forwarding

- name: Install required packages
  ansible.builtin.apt:
    name: "{{ required_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags:
    - iac-control
    - packages

- name: Deploy HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: "haproxy -c -f %s"
  notify: restart haproxy
  tags:
    - iac-control
    - haproxy

- name: Enable and start HAProxy
  ansible.builtin.systemd:
    name: haproxy
    state: started
    enabled: true
  tags:
    - iac-control
    - haproxy

- name: Deploy Squid configuration
  ansible.builtin.template:
    src: squid.conf.j2
    dest: /etc/squid/squid.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart squid
  tags:
    - iac-control
    - squid

- name: Deploy Squid OKD egress allowlist
  ansible.builtin.template:
    src: okd-egress-allowlist.txt.j2
    dest: /etc/squid/okd-egress-allowlist.txt
    owner: root
    group: root
    mode: "0644"
  notify: restart squid
  tags:
    - iac-control
    - squid

- name: Enable and start Squid
  ansible.builtin.systemd:
    name: squid
    state: started
    enabled: true
  tags:
    - iac-control
    - squid

- name: Remove ubuntu-fan dnsmasq config (conflicts with bind-dynamic)
  ansible.builtin.file:
    path: /etc/dnsmasq.d/ubuntu-fan
    state: absent
  notify: restart dnsmasq
  tags:
    - iac-control
    - dnsmasq

- name: Deploy dnsmasq configuration
  ansible.builtin.template:
    src: dnsmasq-overwatch.conf.j2
    dest: /etc/dnsmasq.d/overwatch.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart dnsmasq
  tags:
    - iac-control
    - dnsmasq

- name: Deploy Sentinel services DNS configuration (SC-7(16))
  ansible.builtin.template:
    src: dnsmasq-sentinel-services.conf.j2
    dest: /etc/dnsmasq.d/sentinel-services.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart dnsmasq
  tags:
    - iac-control
    - dnsmasq
    - nist-sc-7

- name: Create dnsmasq override directory
  ansible.builtin.file:
    path: /etc/systemd/system/dnsmasq.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - iac-control
    - dnsmasq

- name: Deploy dnsmasq wait-for-ens19 override
  ansible.builtin.template:
    src: wait-for-ens19.conf.j2
    dest: /etc/systemd/system/dnsmasq.service.d/wait-for-ens19.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - daemon-reload
    - restart dnsmasq
  tags:
    - iac-control
    - dnsmasq

- name: Enable and start dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    state: started
    enabled: true
  tags:
    - iac-control
    - dnsmasq

- name: Deploy IP forwarding sysctl
  ansible.builtin.template:
    src: 99-ip-forward.conf.j2
    dest: /etc/sysctl.d/99-ip-forward.conf
    owner: root
    group: root
    mode: "0644"
  register: sysctl_result
  tags:
    - iac-control
    - networking

- name: Apply sysctl changes
  ansible.builtin.command:
    cmd: sysctl --system
  when: sysctl_result.changed
  changed_when: true
  tags:
    - iac-control
    - networking

- name: Deploy netplan secondary interface
  ansible.builtin.template:
    src: 99-ens19.yaml.j2
    dest: /etc/netplan/99-ens19.yaml
    owner: root
    group: root
    mode: "0600"
  notify: apply netplan
  tags:
    - iac-control
    - networking

- name: Deploy iptables rules (reference backup)
  ansible.builtin.template:
    src: rules.v4.j2
    dest: /etc/iptables/rules.v4
    owner: root
    group: root
    mode: "0644"
  tags:
    - iac-control
    - iptables

# --- UFW firewall configuration ---
# UFW manages the firewall on iac-control. FORWARD and NAT rules are
# integrated into UFW's before.rules to persist across reboots.
# The rules.v4 above is kept as a reference/backup only.

- name: Deploy UFW before.rules with OKD FORWARD and NAT rules
  ansible.builtin.template:
    src: ufw-before.rules.j2
    dest: /etc/ufw/before.rules
    owner: root
    group: root
    mode: "0640"
  notify: reload ufw
  tags:
    - iac-control
    - firewall
    - egress

- name: Allow HAProxy HTTPS ingress (port 443)
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    comment: "OKD Ingress HTTPS"
  tags:
    - iac-control
    - firewall

- name: Allow HAProxy HTTP ingress (port 80)
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    comment: "OKD Ingress HTTP"
  tags:
    - iac-control
    - firewall

- name: Allow OKD API (port 6443)
  community.general.ufw:
    rule: allow
    port: "6443"
    proto: tcp
    comment: "OKD API"
  tags:
    - iac-control
    - firewall

- name: Allow OKD Machine Config Server (port 22623)
  community.general.ufw:
    rule: allow
    port: "22623"
    proto: tcp
    comment: "OKD MCS"
  tags:
    - iac-control
    - firewall

- name: Allow DNS (port 53)
  community.general.ufw:
    rule: allow
    port: "53"
    comment: "DNS"
  tags:
    - iac-control
    - firewall

- name: Allow DHCP (port 67 UDP)
  community.general.ufw:
    rule: allow
    port: "67"
    proto: udp
    comment: "DHCP"
  tags:
    - iac-control
    - firewall

- name: Allow PXE nginx (port 8080)
  community.general.ufw:
    rule: allow
    port: "8080"
    proto: tcp
    comment: "PXE nginx"
  tags:
    - iac-control
    - firewall

- name: Allow Istio IngressGateway via HAProxy (port 8081)
  community.general.ufw:
    rule: allow
    port: "8081"
    proto: tcp
    comment: "Istio IngressGateway"
  tags:
    - iac-control
    - firewall

- name: Allow VRRP protocol (keepalived)
  community.general.ufw:
    rule: allow
    proto: "112"
    comment: "VRRP"
  tags:
    - iac-control
    - firewall

- name: Allow Sentinel Matrix bot webhook (port 9095)
  community.general.ufw:
    rule: allow
    port: "{{ matrix_bot_port }}"
    proto: tcp
    from_ip: "${LAN_NETWORK}/24"
    comment: "Sentinel Matrix bot webhook"
  tags:
    - iac-control
    - firewall

- name: Allow qBittorrent proxy for OKD arr stack (port 18080)
  community.general.ufw:
    rule: allow
    port: "18080"
    proto: tcp
    from_ip: "${OKD_NETWORK}/24"
    comment: "qBittorrent proxy"
  tags:
    - iac-control
    - firewall

- name: Ensure UFW is enabled
  community.general.ufw:
    state: enabled
  tags:
    - iac-control
    - firewall

- name: Include keepalived configuration
  ansible.builtin.include_tasks: keepalived.yml
  tags:
    - iac-control
    - keepalived

- name: Include NetBox sync configuration
  ansible.builtin.include_tasks: netbox-sync.yml
  tags:
    - netbox

- name: Include additional service configuration
  ansible.builtin.include_tasks: services.yml
  tags:
    - services
