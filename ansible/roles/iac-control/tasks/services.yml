# --- Wazuh agent tuning ---

- name: Deploy Wazuh agent local_internal_options to increase event buffer
  ansible.builtin.copy:
    content: |
      # Increased buffer to prevent event queue overflow (L9 alerts during compliance runs)
      agent.buffer_size=20000
      agent.events_per_second=1000
    dest: /var/ossec/etc/local_internal_options.conf
    owner: root
    group: wazuh
    mode: "0640"
  notify: restart wazuh-agent
  tags:
    - services
    - wazuh

