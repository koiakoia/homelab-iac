---
# iac-control role - additional services
# Binary tools, etcd backup, grafana alerts, qbit proxy, nginx PXE, GitLab Runner

# --- Binary tools ---
# These are installed manually via scripts/binaries, not apt.
# We check if they exist and skip if present.
# Version pinning could be added later for reproducibility.

- name: Check which binary tools are installed
  ansible.builtin.command:
    cmd: "which {{ item.name }}"
  loop: "{{ binary_tools }}"
  register: binary_tool_checks
  changed_when: false
  failed_when: false
  tags:
    - services
    - binary-tools

- name: Display binary tool status
  ansible.builtin.debug:
    msg: "{{ item.item.name }}: {{ 'installed' if item.rc == 0 else 'MISSING - install manually' }}"
  loop: "{{ binary_tool_checks.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags:
    - services
    - binary-tools

# --- GitLab Runner ---
# Installed as a standalone binary at /usr/local/bin/gitlab-runner (not via apt).
# We only check if it exists and deploy config if a token is provided.

- name: Check if GitLab Runner is installed
  ansible.builtin.command:
    cmd: which gitlab-runner
  register: gitlab_runner_check
  changed_when: false
  failed_when: false
  tags:
    - services
    - gitlab-runner

- name: Display GitLab Runner status
  ansible.builtin.debug:
    msg: "gitlab-runner: {{ 'installed' if gitlab_runner_check.rc == 0 else 'MISSING - install manually' }}"
  tags:
    - services
    - gitlab-runner

- name: Deploy GitLab Runner config
  ansible.builtin.template:
    src: gitlab-runner-config.toml.j2
    dest: /etc/gitlab-runner/config.toml
    owner: root
    group: root
    mode: "0600"
  when:
    - gitlab_runner_check.rc == 0
    - gitlab_runner_token | length > 0
  tags:
    - services
    - gitlab-runner

