# --- Sentinel Prometheus ---
# Standalone Prometheus instance for scraping UniFi, Traefik, Vault, Wazuh metrics.
# Grafana in OKD uses this as a secondary datasource (http://${IAC_CONTROL_IP}:9099).

- name: Download Prometheus {{ prometheus_version }}
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz"
    dest: /tmp/prometheus-{{ prometheus_version }}.tar.gz
    mode: "0644"
  tags:
    - services
    - prometheus

- name: Extract Prometheus binary
  ansible.builtin.unarchive:
    src: /tmp/prometheus-{{ prometheus_version }}.tar.gz
    dest: /tmp/
    remote_src: true
    creates: /tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus
  tags:
    - services
    - prometheus

- name: Install Prometheus binary
  ansible.builtin.copy:
    src: /tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}
    dest: /usr/local/bin/{{ item }}
    mode: "0755"
    remote_src: true
  loop:
    - prometheus
    - promtool
  notify:
    - restart sentinel-prometheus
  tags:
    - services
    - prometheus

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0755"
  loop:
    - /etc/prometheus
    - /opt/prometheus-unifi
    - "{{ prometheus_data_dir }}"
  tags:
    - services
    - prometheus

- name: Deploy Prometheus config
  ansible.builtin.template:
    src: sentinel-prometheus.yml.j2
    dest: /opt/prometheus-unifi/prometheus.yml
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  notify:
    - restart sentinel-prometheus
  tags:
    - services
    - prometheus

- name: Create Prometheus config symlink
  ansible.builtin.file:
    src: /opt/prometheus-unifi/prometheus.yml
    dest: /etc/prometheus/prometheus.yml
    state: link
    force: true
  tags:
    - services
    - prometheus

- name: Deploy sentinel-prometheus.service
  ansible.builtin.template:
    src: sentinel-prometheus.service.j2
    dest: /etc/systemd/system/sentinel-prometheus.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - daemon-reload
    - restart sentinel-prometheus
  tags:
    - services
    - prometheus

- name: Enable and start sentinel-prometheus
  ansible.builtin.systemd:
    name: sentinel-prometheus
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - services
    - prometheus

- name: Clean up Prometheus tarball
  ansible.builtin.file:
    path: /tmp/prometheus-{{ prometheus_version }}.tar.gz
    state: absent
  tags:
    - services
    - prometheus

# --- UniFi monitoring stack (collector + exporter) ---
# Collector runs every 5 minutes via systemd timer, writes JSON snapshot.
# Exporter is a long-running HTTP server exposing Prometheus metrics at :9120.

- name: Clone sentinel-unifi repository
  ansible.builtin.git:
    repo: "{{ unifi_gitlab_repo }}"
    dest: "{{ unifi_repo_dir }}"
    version: main
    update: true
    force: false
  become: true
