---
# NetBox Proxmox sync automation
# Syncs VM state from Proxmox API to NetBox IPAM

- name: Create NetBox sync log directory
  ansible.builtin.file:
    path: /var/log/sentinel/netbox-sync
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - netbox

- name: Deploy NetBox sync script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../scripts/netbox-sync-proxmox.sh"
    dest: /usr/local/bin/netbox-sync-proxmox.sh
    owner: root
    group: root
    mode: "0755"
  tags:
    - netbox

- name: Deploy NetBox sync environment file
  ansible.builtin.template:
    src: netbox-sync.env.j2
    dest: /etc/sentinel/netbox-sync.env
    owner: root
    group: root
    mode: "0600"
  tags:
    - netbox

- name: Deploy NetBox sync systemd service
  ansible.builtin.template:
    src: netbox-sync-proxmox.service.j2
    dest: /etc/systemd/system/netbox-sync-proxmox.service
    owner: root
    group: root
    mode: "0644"
  notify: daemon-reload
  tags:
    - netbox

- name: Deploy NetBox sync systemd timer
  ansible.builtin.template:
    src: netbox-sync-proxmox.timer.j2
    dest: /etc/systemd/system/netbox-sync-proxmox.timer
    owner: root
    group: root
    mode: "0644"
  notify:
    - daemon-reload
    - restart netbox-sync-timer
  tags:
    - netbox

- name: Enable and start NetBox sync timer
  ansible.builtin.systemd:
    name: netbox-sync-proxmox.timer
    state: "{{ 'started' if netbox_sync_enabled else 'stopped' }}"
    enabled: "{{ netbox_sync_enabled }}"
    daemon_reload: true
  tags:
    - netbox
