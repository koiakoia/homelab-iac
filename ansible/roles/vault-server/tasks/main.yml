---

- name: Validate required secrets are provided
  ansible.builtin.assert:
    that:
      - minio_access_key | default('') | length > 0
      - minio_secret_key | default('') | length > 0
    fail_msg: "Required secrets (minio_access_key, minio_secret_key) must be provided via extra-vars or vault lookup"
  tags: [vault, validation]

- name: Create Vault directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ vault_data_dir }}"
    - "{{ vault_config_dir }}"
    - "{{ vault_log_dir }}"
    - "{{ vault_compose_dir }}"
  tags: [vault]

- name: Deploy Vault docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ vault_compose_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart vault
  tags: [vault]

- name: Deploy Vault config.hcl
  ansible.builtin.template:
    src: config.hcl.j2
    dest: "{{ vault_config_dir }}/config.hcl"
    mode: "0644"
  notify: Restart vault
  tags: [vault]

- name: Deploy Vault audit logrotate
  ansible.builtin.template:
    src: vault-logrotate.j2
    dest: /etc/logrotate.d/vault
    mode: "0644"
  tags: [vault]

- name: Deploy vault-backup.sh
  ansible.builtin.template:
    src: vault-backup.sh.j2
    dest: /usr/local/bin/vault-backup.sh
    mode: "0755"
  tags: [vault]

- name: Deploy vault-backup.env
  ansible.builtin.template:
    src: vault-backup.env.j2
    dest: /etc/vault-backup.env
    mode: "0600"
  tags: [vault]

- name: Deploy vault-backup systemd service
  ansible.builtin.template:
    src: vault-backup.service.j2
    dest: /etc/systemd/system/vault-backup.service
    mode: "0644"
  notify: Daemon reload
  tags: [vault]

- name: Deploy vault-backup systemd timer
  ansible.builtin.template:
    src: vault-backup.timer.j2
    dest: /etc/systemd/system/vault-backup.timer
    mode: "0644"
  notify: Daemon reload
  tags: [vault]

- name: Start Vault via docker compose
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ vault_compose_dir }}"
  register: vault_compose_result
  changed_when: "'Started' in vault_compose_result.stderr or 'Creating' in vault_compose_result.stderr"
  tags: [vault]

- name: Enable vault-backup timer
  ansible.builtin.systemd:
    name: vault-backup.timer
    enabled: true
    state: started
    daemon_reload: true
  tags: [vault]

- name: Reminder - Vault unseal required
  ansible.builtin.debug:
    msg: >
      IMPORTANT: Vault is running but SEALED. You must unseal manually
      using Shamir keys from Proton Pass. Run: vault operator unseal
  tags: [vault]
