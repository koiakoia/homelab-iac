---
- name: Create seedbox directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ seedbox_dir }}"
    - "{{ seedbox_config_dir }}"
    - "{{ seedbox_downloads_dir }}"
  tags: [seedbox]

- name: Deploy seedbox docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ seedbox_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart seedbox
  tags: [seedbox]

- name: Start seedbox services
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ seedbox_dir }}"
  register: seedbox_compose_result
  changed_when: "'Started' in seedbox_compose_result.stderr or 'Creating' in seedbox_compose_result.stderr"
  tags: [seedbox]
