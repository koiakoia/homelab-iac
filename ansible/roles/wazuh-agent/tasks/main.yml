---
- name: Install gnupg and apt-transport-https
  ansible.builtin.apt:
    name:
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Check if Wazuh GPG keyring exists
  ansible.builtin.stat:
    path: /etc/apt/keyrings/wazuh.gpg
  register: wazuh_keyring

- name: Download and dearmor Wazuh GPG key (OPS-15)
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://packages.wazuh.com/key/GPG-KEY-WAZUH |
      gpg --dearmor -o /etc/apt/keyrings/wazuh.gpg
  args:
    creates: /etc/apt/keyrings/wazuh.gpg
  when: not wazuh_keyring.stat.exists

- name: Set Wazuh keyring permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/wazuh.gpg
    mode: '0644'
    owner: root
    group: root

- name: Add Wazuh repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main"
    state: present

- name: Install Wazuh agent
  ansible.builtin.apt:
    name: wazuh-agent
    state: present
  environment:
    WAZUH_MANAGER: "{{ wazuh_manager_ip }}"

- name: Configure Wazuh agent (ossec.conf)
  ansible.builtin.template:
    src: ossec.conf.j2
    dest: "{{ wazuh_agent_config_path }}"
    owner: root
    group: wazuh
    mode: '0660'
  notify: Restart wazuh-agent

- name: Ensure Wazuh agent is started and enabled
  ansible.builtin.service:
    name: wazuh-agent
    state: started
    enabled: true
