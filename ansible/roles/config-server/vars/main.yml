---
# Variables for config-server configuration
# Mirrors OKD cluster vars from iac-control for HA failover

# Required packages (apt)
required_packages:
  - haproxy
  - dnsmasq
  - dnsmasq-base
  - nginx
  - keepalived
  - rsync
  - jq
  - curl
  - qemu-guest-agent

# Network
okd_gateway_ip: "${OKD_NETWORK_GW}"
okd_dhcp_ip: "${OKD_GATEWAY}"  # config-server listens instead of .10
okd_network: "${OKD_NETWORK}/24"
management_network: "${LAN_NETWORK}/24"

# OKD Cluster nodes (used by HAProxy, dnsmasq templates)
okd_bootstrap_node:
  mac: "aa:bb:cc:dd:ee:ff"
  ip: "${OKD_BOOTSTRAP_IP}"
  hostname: "bootstrap"

okd_master_nodes:
  - name: master-1
    mac: "${MAC_ADDRESS}"
    ip: "${OKD_MASTER1_IP}"
  - name: master-2
    mac: "${MAC_ADDRESS}"
    ip: "${OKD_MASTER2_IP}"
  - name: master-3
    mac: "${MAC_ADDRESS}"
    ip: "${OKD_MASTER3_IP}"

# HAProxy backend ports
haproxy_api_port: 6443
haproxy_machine_config_port: 22623
haproxy_http_port: 80
haproxy_https_port: 443

# HAProxy
haproxy_stats_bind: "127.0.0.1:9000"

# DNS upstream servers
dns_upstream_servers:
  - 1.1.1.1
  - 8.8.8.8

# Nginx PXE directories
nginx_pxe_dirs:
  - /var/www/html/ignition
  - /var/www/html/scos
