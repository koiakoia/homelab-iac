---
# config-server - PXE artifact sync from iac-control

- name: Deploy PXE sync systemd service
  ansible.builtin.template:
    src: pxe-sync.service.j2
    dest: /etc/systemd/system/pxe-sync.service
    owner: root
    group: root
    mode: "0644"
  notify: daemon-reload
  tags:
    - config-server
    - pxe-sync

- name: Deploy PXE sync systemd timer
  ansible.builtin.template:
    src: pxe-sync.timer.j2
    dest: /etc/systemd/system/pxe-sync.timer
    owner: root
    group: root
    mode: "0644"
  notify: daemon-reload
  tags:
    - config-server
    - pxe-sync

- name: Enable and start PXE sync timer
  ansible.builtin.systemd:
    name: pxe-sync.timer
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - config-server
    - pxe-sync
